<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentPreproxy</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- Title Bar -->
  <div class="titlebar">
    <div class="titlebar-left">
      <span class="icon">⟪⟫</span>
      <h1>AgentPreproxy</h1>
    </div>
    <div class="titlebar-right">
      <button class="lang-btn" id="langZh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" id="langEn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section" data-i18n="sidebar.config">CONFIGURATION</div>
      <div class="sidebar-item active" data-panel="upstream">
        <span>⬡</span> <span data-i18n="sidebar.upstream">Upstream API</span>
      </div>
      <div class="sidebar-item" data-panel="proxy">
        <span>◈</span> <span data-i18n="sidebar.proxy">Proxy Settings</span>
      </div>
      <div class="sidebar-section" data-i18n="sidebar.runtime">RUNTIME</div>
      <div class="sidebar-item" data-panel="control">
        <span>▶</span> <span data-i18n="sidebar.control">Control</span>
      </div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Upstream Panel -->
      <div class="panel" id="panel-upstream">
        <div class="panel-header">
          <span data-i18n="upstream.title">Upstream API Configuration</span>
        </div>
        <div class="panel-body">
          <div class="form-row">
            <div class="form-group">
              <label>openai_base_url</label>
              <input id="openaiUrl" type="text" value="https://api.openai.com" />
            </div>
            <div class="form-group">
              <label>openai_api_key</label>
              <input id="openaiKey" type="password" placeholder="sk-..." />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>anthropic_base_url</label>
              <input id="anthropicUrl" type="text" value="https://api.anthropic.com" />
            </div>
            <div class="form-group">
              <label>anthropic_api_key</label>
              <input id="anthropicKey" type="password" placeholder="sk-ant-..." />
            </div>
          </div>
        </div>
      </div>

      <!-- Proxy Panel -->
      <div class="panel" id="panel-proxy" style="display:none;">
        <div class="panel-header">
          <span data-i18n="proxy.title">Proxy Settings</span>
        </div>
        <div class="panel-body">
          <div class="form-row">
            <div class="form-group">
              <label>listen_port</label>
              <input id="port" type="number" value="8600" min="1024" max="65535" />
            </div>
            <div class="form-group">
              <label>watchdog_mode</label>
              <select id="mode">
                <option value="both" selected data-i18n-opt="mode.both">both (recommended)</option>
                <option value="strong" data-i18n-opt="mode.strong">strong (fixed-period)</option>
                <option value="weak" data-i18n-opt="mode.weak">weak (on-demand)</option>
                <option value="off" data-i18n-opt="mode.off">off (passthrough)</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>strong_k <span style="color:#6c7086"># words per tag</span></label>
              <input id="strongK" type="number" value="50" min="10" max="500" />
            </div>
            <div class="form-group">
              <label>python_path</label>
              <input id="pythonPath" type="text" value="python3" />
            </div>
          </div>
        </div>
      </div>

      <!-- Control Panel -->
      <div class="panel" id="panel-control" style="display:none;">
        <div class="panel-header">
          <span data-i18n="control.title">Proxy Control</span>
        </div>
        <div class="panel-body">
          <div class="btn-group">
            <button class="btn-primary" id="btnStart" data-i18n="control.start">▶ Start Proxy</button>
            <button class="btn-danger" id="btnStop" disabled data-i18n="control.stop">■ Stop Proxy</button>
          </div>
          <div id="endpointBox" class="endpoint-box" style="display:none;">
            <span data-i18n="control.endpoint">Proxy endpoint:</span>
            <strong id="endpointUrl"></strong>
            <div class="hint" data-i18n="control.hint">Point your AI agent software to this URL</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer / Status Bar -->
  <div class="footer">
    <div class="footer-left">
      <span class="status-dot off" id="statusDot"></span>
      <span id="statusText" data-i18n="status.stopped">Stopped</span>
    </div>
    <div class="footer-right">
      <span>v0.1.0</span>
      <span style="margin: 0 6px;">·</span>
      <span>watchdog: <span id="footerMode">both</span></span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
