<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentPreproxy</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <h1>AgentPreproxy</h1>
  <p class="subtitle">AI Attention Watchdog</p>

  <div class="card">
    <h2>Upstream API</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>OpenAI API URL</label>
        <input id="openaiUrl" type="text" value="https://api.openai.com" />
      </div>
      <div class="form-group">
        <label>OpenAI API Key</label>
        <input id="openaiKey" type="password" placeholder="sk-..." />
      </div>
      <div class="form-group">
        <label>Anthropic API URL</label>
        <input id="anthropicUrl" type="text" value="https://api.anthropic.com" />
      </div>
      <div class="form-group">
        <label>Anthropic API Key</label>
        <input id="anthropicKey" type="password" placeholder="sk-ant-..." />
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Proxy Settings</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Port</label>
        <input id="port" type="number" value="8600" min="1024" max="65535" />
      </div>
      <div class="form-group">
        <label>Watchdog Mode</label>
        <select id="mode">
          <option value="both" selected>both (recommended)</option>
          <option value="strong">strong (fixed-period Tag)</option>
          <option value="weak">weak (on-demand)</option>
          <option value="off">off (passthrough)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tag interval (words)</label>
        <input id="strongK" type="number" value="50" min="10" max="500" />
      </div>
      <div class="form-group">
        <label>Python path</label>
        <input id="pythonPath" type="text" value="python3" placeholder="python3" />
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-start" id="btnStart">Start Proxy</button>
    <button class="btn-stop" id="btnStop" disabled>Stop Proxy</button>
  </div>

  <div id="statusBar" class="status-bar stopped">
    <span class="dot off" id="statusDot"></span>
    <span id="statusText">Not running</span>
  </div>

  <div class="endpoint-box" id="endpointBox" style="display:none;">
    Proxy endpoint: <strong id="endpointUrl"></strong><br/>
    <span style="color:#666; font-size:0.85em;">Point your agent software to this URL</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
